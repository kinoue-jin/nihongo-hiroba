name: Keep Alive

on:
  schedule:
    # Run at 9:00 UTC on Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VERCEL_DEPLOYMENT_URL }}"
